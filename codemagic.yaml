workflows:
  ios-build:
    name: iOS IPA Build
    environment:
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - npm ci
      - npx expo prebuild --platform ios
      - cd ios && pod install

      - xcodebuild -workspace ios/*.xcworkspace \
          -scheme SamuelAssist \
          -configuration Release \
          -sdk iphoneos \
          -archivePath build/SamuelAssist.xcarchive \
          archive

      - xcodebuild -exportArchive \
          -archivePath build/SamuelAssist.xcarchive \
          -exportOptionsPlist ios/exportOptions.plist \
          -exportPath build

    artifacts:
      - build/**/*.ipa
