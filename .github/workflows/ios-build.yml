name: iOS Build (Samuel Assist)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fix permissions for expo
        run: chmod +x node_modules/.bin/*

      - name: Generate iOS native project
        run: npx expo prebuild --platform ios

      - name: Build IPA
        run: |
          cd ios
          xcodebuild -scheme SamuelAssist -configuration Release -sdk iphoneos -archivePath SamuelAssist.xcarchive archive
          xcodebuild -exportArchive -archivePath SamuelAssist.xcarchive -exportPath . -exportOptionsPlist exportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SamuelAssist.ipa
          path: SamuelAssist.ipa
