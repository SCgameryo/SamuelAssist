name: iOS Build (Debug)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --non-interactive

      - name: Show iOS project
        run: |
          ls -la
          ls -la ios || true

      - name: List Xcode schemes
        run: |
          cd ios
          xcodebuild -list

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build (verbose)
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
                     -scheme $(xcodebuild -list | grep -A 20 Schemes | tail -n 1 | xargs) \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     build
