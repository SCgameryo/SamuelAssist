name: iOS Build (EAS)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Expo CLI
        run: npm install -g eas-cli expo-cli

      - name: Install dependencies
        run: npm install

      - name: Login check (debug only)
        run: npx expo doctor || true

      - name: Build iOS (EAS)
        run: eas build -p ios --non-interactive --profile preview
